# docker-compose.yaml for Zenith-tier Deployment
version: '3.8'

services:
  zenith-backend:
    build: .
    container_name: zenith-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - backend/.env
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - HISTORY_DB_PATH=/app/data/scan_history.db
    restart: unless-stopped
